<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA LIN - Salida de Mercancía</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/tables.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/ferreteria/salidas.css">
</head>

<body class="sga-layout">

    <div class="sga-main">

        <header class="sga-header">
            <div class="sga-header-left">
                <button class="sga-hamburger" aria-label="Abrir menú">☰</button>
                <nav class="sga-breadcrumb">
                    <a href="../../index.html">Inicio</a>
                    <span class="sga-breadcrumb-sep">›</span>
                    <a href="index.html">Ferretería</a>
                    <span class="sga-breadcrumb-sep">›</span>
                    <span class="sga-breadcrumb-current">Salida de Mercancía</span>
                </nav>
            </div>
            <div class="sga-header-right"></div>
        </header>

        <div class="sga-content">
            <main class="container">
                <header class="toolbar">
                    <div class="toolbar-title">
                        <h1>📤 Salida de Mercancía</h1>
                    </div>
                    <div class="toolbar-actions">
                        <button class="btn-tool">💾 Registrar Salida</button>
                        <button class="btn-tool btn-danger">🧹 Cancelar</button>
                    </div>
                </header>

                <form class="exit-form">
                    <fieldset class="form-section">
                        <legend>Información del Movimiento</legend>
                        <div class="form-grid">
                            <div class="field">
                                <label>Fecha Salida</label>
                                <input type="date" id="sal-fecha">
                            </div>
                            <div class="field">
                                <label>Cód. Operario</label>
                                <input type="text" id="sal-op-cod" placeholder="Escanear tarjeta...">
                            </div>
                            <div class="field span-2">
                                <label>Nombre del Operario</label>
                                <input type="text" id="sal-op-nombre" readonly class="readonly-input" placeholder="Nombre del trabajador">
                            </div>
                            <div class="field span-2">
                                <label>Destino / Obra</label>
                                <input type="text" id="sal-destino" placeholder="Ej: Mantenimiento Planta A">
                            </div>
                            <div class="field span-2">
                                <label>Nº Orden de Trabajo (OT)</label>
                                <input type="text" id="sal-ot" placeholder="Opcional...">
                            </div>
                        </div>
                    </fieldset>

                    <fieldset class="form-section highlight-exit">
                        <legend>Retirada de Material</legend>
                        <div class="form-grid-detail">
                            <div class="field">
                                <label>Cód. Artículo</label>
                                <input type="text" id="sal-art-cod" placeholder="Código...">
                            </div>
                            <div class="field span-3">
                                <label>Descripción</label>
                                <input type="text" id="sal-art-nombre" readonly class="readonly-input" placeholder="Descripción del producto">
                            </div>
                            <div class="field">
                                <label>Stock Actual</label>
                                <input type="text" id="sal-stock" readonly class="readonly-input" placeholder="0">
                            </div>
                            <div class="field">
                                <label>Cantidad Salida</label>
                                <input type="number" id="sal-cantidad" placeholder="0">
                            </div>
                        </div>
                        <div class="form-actions-inner">
                            <button type="button" class="btn-add">+ Añadir a la lista</button>
                        </div>
                    </fieldset>

                    <div class="preview-table-wrapper">
                        <h3>Materiales a retirar</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Código</th>
                                    <th>Descripción</th>
                                    <th>Cantidad</th>
                                    <th>Ubicación Origen</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-salidas">
                                <tr class="placeholder-row">
                                    <td colspan="5">No hay materiales seleccionados para la salida.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </form>
            </main>
        </div>

    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/ui/sidebar.js"></script>
    <script src="../../js/ui/layout.js"></script>
    <script src="../../js/ferreteria/salidas.js"></script>
</body>

</html>

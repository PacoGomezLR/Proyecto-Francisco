<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA LIN - Gestión de Operarios</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/tables.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/ferreteria/operarios.css">
</head>

<body class="sga-layout">

    <div class="sga-main">

        <header class="sga-header">
            <div class="sga-header-left">
                <button class="sga-hamburger" aria-label="Abrir menú">☰</button>
                <nav class="sga-breadcrumb">
                    <a href="../../index.html">Inicio</a>
                    <span class="sga-breadcrumb-sep">›</span>
                    <a href="index.html">Catálogo</a>
                    <span class="sga-breadcrumb-sep">›</span>
                    <span class="sga-breadcrumb-current">Operarios</span>
                </nav>
            </div>
            <div class="sga-header-right"></div>
        </header>

        <div class="sga-content">
            <div class="sga-inner">
                <div class="sga-page-header">
                    <div>
                        <h1 class="sga-page-title">Operarios</h1>
                        <p class="sga-page-description">Personal autorizado para retiradas y movimientos · SGA LIN</p>
                    </div>
                    <button class="sga-btn sga-btn-primary sga-btn-sm" id="btn-nuevo">+ Añadir Operario</button>
                </div>

                <div class="status-summary">
                    <div class="status-item">
                        <span class="label">Total:</span>
                        <span class="count" id="total-operarios">—</span>
                    </div>
                </div>

                <div class="filter-panel">
                    <input type="text" id="buscador" placeholder="Buscar por nombre, código o email..." class="search-bar">
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Cód. Operario</th>
                                <th>Nombre Completo</th>
                                <th>Dirección</th>
                                <th>Teléfono</th>
                                <th>Email Corporativo</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-operarios">
                            <tr><td colspan="6" class="loading">Cargando operarios...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- Modal nuevo operario -->
    <div id="modal-backdrop" class="modal-backdrop"></div>
    <div id="modal-nuevo" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
        <div class="modal-header">
            <h2 class="modal-titulo" id="modal-titulo">Nuevo Operario</h2>
            <button id="btn-modal-cerrar" class="det-close" title="Cerrar">✕</button>
        </div>
        <div class="modal-body">
            <div class="modal-grid">
                <div class="mf-group">
                    <label class="mf-label">Código *</label>
                    <input class="mf-input" id="nw-cod" placeholder="OP008" maxlength="10">
                </div>
                <div class="mf-group mf-full">
                    <label class="mf-label">Nombre Completo *</label>
                    <input class="mf-input" id="nw-nom" placeholder="Nombre Apellido Apellido">
                </div>
                <div class="mf-group mf-full">
                    <label class="mf-label">Dirección</label>
                    <input class="mf-input" id="nw-dir" placeholder="Calle ejemplo 1, Ciudad">
                </div>
                <div class="mf-group">
                    <label class="mf-label">Teléfono</label>
                    <input class="mf-input" id="nw-tel" placeholder="600000000" type="tel">
                </div>
                <div class="mf-group">
                    <label class="mf-label">Email Corporativo</label>
                    <input class="mf-input" id="nw-ema" placeholder="nombre@sgalin.es" type="email">
                </div>
                <div class="mf-group">
                    <label class="mf-label">Estado</label>
                    <select class="mf-input" id="nw-act">
                        <option value="1">Activo</option>
                        <option value="0">Inactivo</option>
                    </select>
                </div>
            </div>
            <p id="modal-error" class="modal-error" hidden></p>
        </div>
        <div class="modal-footer">
            <button class="btn-tool secondary" id="btn-modal-cancelar">Cancelar</button>
            <button class="btn-tool primary"   id="btn-modal-guardar">Guardar operario</button>
        </div>
    </div>

    <!-- Panel detalle operario -->
    <div id="panel-backdrop" class="det-backdrop"></div>
    <aside id="panel-detalle" class="det-panel">
        <div class="det-header">
            <span id="det-cod" class="det-title-cod"></span>
            <button id="btn-cerrar-panel" class="det-close" title="Cerrar">✕</button>
        </div>
        <div class="det-raz-wrap">
            <div id="det-nom" class="det-raz"></div>
        </div>
        <div class="det-grid">
            <div class="det-item det-full"><span class="det-label">Dirección</span><span id="det-dir" class="det-value"></span></div>
            <div class="det-item"><span class="det-label">Teléfono</span><span id="det-tel" class="det-value"></span></div>
            <div class="det-item"><span class="det-label">Estado</span><span id="det-act" class="det-value"></span></div>
            <div class="det-item det-full"><span class="det-label">Email</span><span id="det-ema" class="det-value"></span></div>
        </div>
    </aside>

    <script src="../../js/api.js"></script>
    <script src="../../js/ui/sidebar.js"></script>
    <script src="../../js/ui/layout.js"></script>
    <script src="../../js/ferreteria/operarios.js"></script>
</body>

</html>

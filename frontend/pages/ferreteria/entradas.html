<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA LIN - Entrada de Mercancía</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/layout.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/header.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/tables.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/ferreteria/entradas.css">
</head>

<body class="sga-layout">

    <div class="sga-main">

        <header class="sga-header">
            <div class="sga-header-left">
                <button class="sga-hamburger" aria-label="Abrir menú">☰</button>
                <nav class="sga-breadcrumb">
                    <a href="../../index.html">Inicio</a>
                    <span class="sga-breadcrumb-sep">›</span>
                    <a href="index.html">Ferretería</a>
                    <span class="sga-breadcrumb-sep">›</span>
                    <span class="sga-breadcrumb-current">Entrada de Mercancía</span>
                </nav>
            </div>
            <div class="sga-header-right"></div>
        </header>

        <div class="sga-content">
            <main class="container">
                <header class="toolbar">
                    <div class="toolbar-title">
                        <h1>📥 Entrada de Mercancía</h1>
                    </div>
                    <div class="toolbar-actions">
                        <button class="btn-tool" title="Guardar Entrada">💾 Guardar</button>
                        <button class="btn-tool" title="Limpiar Formulario">🧹 Limpiar</button>
                        <button class="btn-tool btn-help" title="Ayuda">❓</button>
                    </div>
                </header>

                <form class="entry-form">
                    <fieldset class="form-section">
                        <legend>Datos del Albarán / Factura</legend>
                        <div class="form-grid">
                            <div class="field">
                                <label>Fecha Entrada</label>
                                <input type="date" id="ent-fecha">
                            </div>
                            <div class="field">
                                <label>Cod. Proveedor</label>
                                <input type="text" id="ent-prov-cod" placeholder="Ej: PROV-001">
                            </div>
                            <div class="field span-2">
                                <label>Nombre del Proveedor</label>
                                <input type="text" id="ent-prov-nombre" placeholder="Buscando proveedor..." readonly class="readonly-input">
                            </div>
                            <div class="field">
                                <label>Nº Albarán</label>
                                <input type="text" id="ent-albaran" placeholder="Ej: ALB-8822">
                            </div>
                        </div>
                    </fieldset>

                    <fieldset class="form-section highlight-section">
                        <legend>Detalle del Artículo</legend>
                        <div class="form-grid-detail">
                            <div class="field">
                                <label>Código Artículo</label>
                                <input type="text" id="ent-art-cod" placeholder="F1-22...">
                            </div>
                            <div class="field span-3">
                                <label>Descripción</label>
                                <input type="text" id="ent-art-nombre" readonly class="readonly-input" placeholder="Nombre del producto">
                            </div>
                            <div class="field">
                                <label>Cantidad</label>
                                <input type="number" id="ent-cantidad" step="0.01" placeholder="0.00">
                            </div>
                            <div class="field">
                                <label>Precio Costo</label>
                                <input type="number" id="ent-precio" step="0.01" placeholder="0.00 €">
                            </div>
                            <div class="field">
                                <label>% Dto.</label>
                                <input type="number" id="ent-dto" placeholder="0">
                            </div>
                            <div class="field">
                                <label>Total Línea</label>
                                <input type="text" id="ent-total" readonly class="readonly-input" placeholder="0.00 €">
                            </div>
                            <div class="field span-2">
                                <label>Trabajador Destino</label>
                                <input type="text" placeholder="Seleccione operario...">
                            </div>
                        </div>
                    </fieldset>

                    <div class="preview-table-wrapper">
                        <h3>Resumen de Carga</h3>
                        <table>
                            <thead>
                                <tr>
                                    <th>Artículo</th>
                                    <th>Descripción</th>
                                    <th>Cant.</th>
                                    <th>Precio</th>
                                    <th>Total</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-entradas">
                                <tr class="placeholder-row">
                                    <td colspan="6">Escanee o introduzca artículos para visualizar la carga actual...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </form>
            </main>
        </div>

    </div>

    <script src="../../js/api.js"></script>
    <script src="../../js/ui/sidebar.js"></script>
    <script src="../../js/ui/layout.js"></script>
    <script src="../../js/ferreteria/entradas.js"></script>
</body>

</html>

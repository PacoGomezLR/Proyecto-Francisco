<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA LIN - Subfamilias</title>
    <link rel="stylesheet" href="../../../../css/base.css">
    <link rel="stylesheet" href="../../../../css/layout.css">
    <link rel="stylesheet" href="../../../../css/sidebar.css">
    <link rel="stylesheet" href="../../../../css/header.css">
    <link rel="stylesheet" href="../../../../css/buttons.css">
    <link rel="stylesheet" href="../../../../css/forms.css">
    <link rel="stylesheet" href="../../../../css/tables.css">
    <link rel="stylesheet" href="../../../../css/responsive.css">
    <link rel="stylesheet" href="../../../../css/opciones/control-de-lotes-y-minimos/subfamilias/index.css">
</head>

<body class="sga-layout">

    <div class="sga-main">

        <header class="sga-header">
            <div class="sga-header-left">
                <button class="sga-hamburger" aria-label="Abrir menú">☰</button>
                <nav class="sga-breadcrumb">
                    <a href="../../../../index.html">Inicio</a>
                    <span class="sga-breadcrumb-sep">›</span>
                    <span class="sga-breadcrumb-current">Subfamilias</span>
                </nav>
            </div>
            <div class="sga-header-right"></div>
        </header>

        <div class="sga-content">
            <div class="sga-inner">
                <div class="sga-page-header">
                    <div>
                        <h1 class="sga-page-title">Subfamilias</h1>
                        <p class="sga-page-description">Control de lotes · SGA LIN</p>
                    </div>
                    <div style="display:flex;gap:8px">
                        <button class="sga-btn sga-btn-secondary sga-btn-sm" id="btn-actualizar">Actualizar (F5)</button>
                        <button class="sga-btn sga-btn-secondary sga-btn-sm" id="btn-nuevo">Nueva fila</button>
                        <button class="sga-btn sga-btn-primary sga-btn-sm" id="btn-guardar">Guardar</button>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table id="tabla-subfamilias">
                        <thead>
                            <tr>
                                <th class="col-num">#</th>
                                <th>Subfamilia</th>
                                <th>Nombre de subfamilia</th>
                                <th class="col-check">Sin control de lote</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-subfamilias">
                            <tr class="edit-row" data-id="new-1">
                                <td class="col-num">1</td>
                                <td><input type="text" class="cell-input cell-code" placeholder="Código"></td>
                                <td><input type="text" class="cell-input cell-wide" placeholder="Nombre de subfamilia"></td>
                                <td class="col-check"><input type="checkbox" class="cell-check"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="../../../../js/api.js"></script>
    <script src="../../../../js/ui/sidebar.js"></script>
    <script src="../../../../js/ui/layout.js"></script>
    <script src="../../../../js/opciones/control-de-lotes-y-minimos/subfamilias.js"></script>
</body>

</html>

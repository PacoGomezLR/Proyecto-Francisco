<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA LIN — Movimientos por Artículo</title>
    <link rel="stylesheet" href="../../../../css/base.css">
    <link rel="stylesheet" href="../../../../css/layout.css">
    <link rel="stylesheet" href="../../../../css/sidebar.css">
    <link rel="stylesheet" href="../../../../css/header.css">
    <link rel="stylesheet" href="../../../../css/buttons.css">
    <link rel="stylesheet" href="../../../../css/forms.css">
    <link rel="stylesheet" href="../../../../css/badges.css">
    <link rel="stylesheet" href="../../../../css/responsive.css">
    <link rel="stylesheet" href="../../../../css/opciones/almacen-y-stock/movimientos-por-articulo/mv.css">
</head>

<body class="sga-layout">

    <!-- sidebar.js inyecta <aside class="sga-sidebar"> aquí -->

    <div class="sga-main">

        <header class="sga-header">
            <div class="sga-header-left">
                <button class="sga-hamburger" aria-label="Abrir menú">☰</button>
                <nav class="sga-breadcrumb">
                    <a href="../../../../index.html">Inicio</a>
                    <span class="sga-breadcrumb-sep">›</span>
                    <span class="sga-breadcrumb-current">Movimientos por artículo</span>
                </nav>
            </div>
            <div class="sga-header-right"></div>
        </header>

        <div class="sga-content">
            <div class="sga-inner">

                <!-- CABECERA -->
                <div class="sga-page-header">
                    <div>
                        <h1 class="sga-page-title">Movimientos por Artículo</h1>
                        <p class="sga-page-description">Timeline de trazabilidad operativa · SGA LIN</p>
                    </div>
                    <div class="mv-header-actions">
                        <button class="sga-btn sga-btn-secondary sga-btn-sm" id="btn-mv-exportar"
                                disabled title="Carga movimientos para exportar">Exportar CSV</button>
                    </div>
                </div>

                <!-- FILTROS -->
                <div class="mv-filter-bar" id="mv-filters">

                    <div class="mv-filter-primary">

                        <div class="mv-filter-group">
                            <label class="mv-filter-label" for="mv-f-articulo">Artículo</label>
                            <input type="text" id="mv-f-articulo" class="mv-f-art"
                                   placeholder="Código…" autocomplete="off">
                        </div>

                        <div class="mv-filter-group">
                            <label class="mv-filter-label" for="mv-f-lote">Lote</label>
                            <input type="text" id="mv-f-lote" class="mv-f-lote"
                                   placeholder="Lote…" autocomplete="off">
                        </div>

                        <div class="mv-filter-group">
                            <label class="mv-filter-label" for="mv-f-ubicacion">Ubicación</label>
                            <input type="text" id="mv-f-ubicacion" class="mv-f-ubi"
                                   placeholder="UBI…" autocomplete="off">
                        </div>

                        <div class="mv-filter-group">
                            <label class="mv-filter-label" for="mv-f-tipo">Tipo</label>
                            <select id="mv-f-tipo" class="mv-f-tipo">
                                <option value="">Todos</option>
                                <option value="PC">Picking cliente</option>
                                <option value="RG">Regularización</option>
                                <option value="PP">Preparación interna</option>
                            </select>
                        </div>

                        <div class="mv-filter-group">
                            <label class="mv-filter-label" for="mv-f-desde">Desde</label>
                            <input type="date" id="mv-f-desde" class="mv-f-date">
                        </div>

                        <div class="mv-filter-group">
                            <label class="mv-filter-label" for="mv-f-hasta">Hasta</label>
                            <input type="date" id="mv-f-hasta" class="mv-f-date">
                        </div>

                        <div class="mv-filter-actions">
                            <button class="sga-btn sga-btn-primary sga-btn-sm" id="btn-mv-buscar">
                                Buscar
                            </button>
                            <button class="sga-btn sga-btn-secondary sga-btn-sm" id="btn-mv-limpiar">
                                Limpiar
                            </button>
                        </div>

                    </div>

                    <div class="mv-filter-secondary">
                        <div class="mv-filter-group">
                            <label class="mv-filter-label" for="mv-f-cliente">Tercero (cliente/proveedor)</label>
                            <input type="text" id="mv-f-cliente" class="mv-f-cli"
                                   placeholder="Código…" autocomplete="off">
                        </div>
                    </div>

                </div>

                <!-- WORKSPACE: TIMELINE + PANEL DETALLE -->
                <div class="mv-workspace">

                    <!-- Timeline -->
                    <div class="mv-timeline-col">
                        <div id="mv-timeline">
                            <div class="mv-placeholder" id="mv-placeholder">
                                <span class="mv-placeholder-icon">🔍</span>
                                Introduce un artículo u otros filtros y pulsa <strong>Buscar</strong>
                                para ver el timeline de movimientos.
                            </div>
                        </div>
                    </div>

                    <!-- Panel detalle -->
                    <aside class="mv-panel" id="mv-panel" aria-label="Detalle del movimiento">
                        <button class="mv-panel-close" id="btn-mv-panel-close"
                                aria-label="Cerrar panel detalle">×</button>
                        <div class="mv-panel-empty" id="mv-panel-empty">
                            <span class="mv-panel-empty-icon">📋</span>
                            Selecciona un movimiento del timeline para ver su detalle completo.
                        </div>
                        <div class="mv-panel-body" id="mv-panel-body" hidden>
                            <!-- Rellenado por JS al seleccionar un movimiento -->
                        </div>
                    </aside>

                </div>

                <!-- Backdrop para overlay en tablet/móvil -->
                <div class="mv-panel-backdrop" id="mv-panel-backdrop"></div>

                <!-- RESUMEN -->
                <div class="mv-summary" id="mv-summary" hidden>
                    <span id="mv-summary-text"></span>
                </div>

            </div><!-- /.sga-inner -->
        </div><!-- /.sga-content -->

    </div><!-- /.sga-main -->

    <script src="../../../../js/api.js"></script>
    <script src="../../../../js/ui/sidebar.js"></script>
    <script src="../../../../js/ui/layout.js"></script>
    <script src="../../../../js/opciones/almacen-y-stock/movimientos-por-articulo-mv.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA LIN - Regularizaciones</title>
    <link rel="stylesheet" href="../../../../css/base.css">
    <link rel="stylesheet" href="../../../../css/layout.css">
    <link rel="stylesheet" href="../../../../css/sidebar.css">
    <link rel="stylesheet" href="../../../../css/header.css">
    <link rel="stylesheet" href="../../../../css/buttons.css">
    <link rel="stylesheet" href="../../../../css/forms.css">
    <link rel="stylesheet" href="../../../../css/tables.css">
    <link rel="stylesheet" href="../../../../css/responsive.css">
    <link rel="stylesheet" href="../../../../css/opciones/almacen-y-stock/regularizaciones/index.css">
</head>

<body class="sga-layout">

    <div class="sga-main">

        <header class="sga-header">
            <div class="sga-header-left">
                <button class="sga-hamburger" aria-label="Abrir menú">☰</button>
                <nav class="sga-breadcrumb">
                    <a href="../../../../index.html">Inicio</a>
                    <span class="sga-breadcrumb-sep">›</span>
                    <span class="sga-breadcrumb-current">Regularizaciones</span>
                </nav>
            </div>
            <div class="sga-header-right"></div>
        </header>

        <div class="sga-content">
            <div class="sga-inner">
                <div class="sga-page-header">
                    <div>
                        <h1 class="sga-page-title">Regularizaciones</h1>
                        <p class="sga-page-description">Almacén · SGA LIN</p>
                    </div>
                    <button class="sga-btn sga-btn-primary sga-btn-sm" id="btn-actualizar">Actualizar (F5)</button>
                </div>

                <div class="filter-bar">
                    <label>Artículo:</label>
                    <input type="text" class="input-code" id="f-articulo" placeholder="Código artículo">
                    <label>Desde:</label>
                    <input type="date" class="input-date" id="f-desde">
                    <label>Hasta:</label>
                    <input type="date" class="input-date" id="f-hasta">
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Documento</th>
                                <th>Artículo</th>
                                <th>Nombre</th>
                                <th>Ubicación</th>
                                <th>Lote</th>
                                <th class="col-num">Cantidad</th>
                                <th>Tercero</th>
                                <th>Nombre tercero</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-reg">
                            <tr class="placeholder-row">
                                <td colspan="9">Pulse Actualizar para cargar los datos.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="../../../../js/api.js"></script>
    <script src="../../../../js/ui/sidebar.js"></script>
    <script src="../../../../js/ui/layout.js"></script>
    <script src="../../../../js/opciones/almacen-y-stock/regularizaciones.js"></script>
</body>

</html>
